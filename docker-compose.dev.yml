services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm2-backend-dev
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-crm2_user}
      - DB_PASSWORD=${DB_PASSWORD:-crm2_password}
      - DB_NAME=${DB_NAME:-crm2_dev}
      - DATABASE_URL=postgresql://${DB_USER:-crm2_user}:${DB_PASSWORD:-crm2_password}@postgres:5432/${DB_NAME:-crm2_dev}?sslmode=${DB_SSLMODE:-disable}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migration:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - crm2-network

  postgres:
    image: postgres:16-alpine
    container_name: crm2-postgres-dev
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-crm2_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-crm2_password}
      - POSTGRES_DB=${DB_NAME:-crm2_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crm2_user} -d ${DB_NAME:-crm2_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - crm2-network

  migration:
    image: arigaio/atlas:latest
    container_name: crm2-atlas-migration-dev
    command:
      - migrate
      - apply
      - --url
      - postgresql://${DB_USER:-crm2_user}:${DB_PASSWORD:-crm2_password}@postgres:5432/${DB_NAME:-crm2_dev}?sslmode=${DB_SSLMODE:-disable}
      - --dir
      - file:///migrations
    volumes:
      - ./backend/internal/prisma/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - crm2-network

  redis:
    image: redis:7-alpine
    container_name: crm2-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_dev:/data
    restart: unless-stopped
    networks:
      - crm2-network

networks:
  crm2-network:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
